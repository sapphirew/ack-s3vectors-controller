ignore:
  resource_names: []
  field_paths:
    # CreateIndex accepts vectorBucketName OR vectorBucketArn as alternative
    # parents. We model only the VectorBucketName reference, so drop the
    # redundant vectorBucketArn arm from the Index spec.
    - CreateIndexInput.VectorBucketArn

operations:
  GetVectorBucket:
    # GetVectorBucketOutput wraps the resource in a `vectorBucket` member.
    # Flatten it so the resource fields populate directly.
    output_wrapper_field_path: VectorBucket
  GetIndex:
    # GetIndexOutput wraps the resource in an `index` member.
    output_wrapper_field_path: Index

resources:
  VectorBucket:
    fields:
      # Primary key. SDK create/get/delete field is `vectorBucketName`; rename
      # it to `Name` (ACK convention) via the resource-level renames block
      # below. Immutable: there is no rename/update API for the bucket name.
      Name:
        is_primary_key: true
        is_immutable: true
      # AWS-assigned creation timestamp from GetVectorBucket. The ARN is not
      # modeled separately — ACK auto-populates Status.ACKResourceMetadata.ARN
      # from CreateVectorBucketOutput.vectorBucketArn.
      CreationTime:
        is_read_only: true
        from:
          operation: GetVectorBucket
          path: VectorBucket.CreationTime
      # Encryption is set only at create; there is no Put/Update encryption
      # API, so the whole configuration is immutable.
      EncryptionConfiguration:
        is_immutable: true
    renames:
      operations:
        CreateVectorBucket:
          input_fields:
            VectorBucketName: Name
        GetVectorBucket:
          input_fields:
            VectorBucketName: Name
        DeleteVectorBucket:
          input_fields:
            VectorBucketName: Name
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      # GetVectorBucket rejects setting both vectorBucketName and
      # vectorBucketArn; clear the ARN so the read keys off the name only.
      sdk_read_one_post_build_request:
        template_path: hooks/vector_bucket/sdk_read_one_post_build_request.go.tpl
      # GetVectorBucket does not return tags; fetch them via
      # ListTagsForResource so the Spec.Tags delta is accurate.
      sdk_read_one_post_set_output:
        template_path: hooks/vector_bucket/sdk_read_one_post_set_output.go.tpl
      # DeleteVectorBucket likewise rejects setting both identifiers; clear the
      # ARN so the delete keys off the name only.
      sdk_delete_post_build_request:
        template_path: hooks/vector_bucket/sdk_delete_post_build_request.go.tpl
      # S3 Vectors always applies a default encryption configuration; adopt the
      # observed default when the user did not specify one to avoid spurious
      # deltas on this immutable, server-managed value.
      delta_pre_compare:
        code: customPreCompare(a, b)
    # No UpdateVectorBucket API; the only mutable surface is Tags, handled by a
    # custom update method.
    update_operation:
      custom_method_name: customUpdateVectorBucket

  Index:
    fields:
      # Primary key (child resource scoped to a VectorBucket). Immutable.
      IndexName:
        is_primary_key: true
        is_immutable: true
      # Parent VectorBucket, referenced by name (same-service reference — do
      # NOT set service_name). Immutable.
      VectorBucketName:
        is_immutable: true
        references:
          resource: VectorBucket
          path: Spec.Name
      # All index configuration is set at create and cannot be changed.
      DataType:
        is_immutable: true
      Dimension:
        is_immutable: true
      DistanceMetric:
        is_immutable: true
      MetadataConfiguration:
        is_immutable: true
      EncryptionConfiguration:
        is_immutable: true
      # AWS-assigned creation timestamp from GetIndex (path is relative to the
      # `index` wrapper flattened above).
      CreationTime:
        is_read_only: true
        from:
          operation: GetIndex
          path: Index.CreationTime
    exceptions:
      errors:
        404:
          code: NotFoundException
      terminal_codes:
        - ValidationException
    hooks:
      # GetIndex rejects setting both the name pair and indexArn; clear the ARN
      # so the read keys off vectorBucketName + indexName.
      sdk_read_one_post_build_request:
        template_path: hooks/index/sdk_read_one_post_build_request.go.tpl
      # GetIndex does not return tags; fetch them via ListTagsForResource so
      # the Spec.Tags delta is accurate.
      sdk_read_one_post_set_output:
        template_path: hooks/index/sdk_read_one_post_set_output.go.tpl
      # DeleteIndex likewise rejects both identifiers; clear the ARN.
      sdk_delete_post_build_request:
        template_path: hooks/index/sdk_delete_post_build_request.go.tpl
      # S3 Vectors applies a default encryption configuration; adopt the
      # observed default when the user omits it to avoid spurious deltas on
      # this immutable, server-managed value.
      delta_pre_compare:
        code: customPreCompare(a, b)
    # No UpdateIndex API; the only mutable surface is Tags.
    update_operation:
      custom_method_name: customUpdateIndex
